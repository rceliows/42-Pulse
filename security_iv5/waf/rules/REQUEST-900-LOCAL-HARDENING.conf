SecRule REQUEST_URI "@rx (?i)(?:^|/)(?:\.env|\.git|\.svn|\.hg|\.ssh|\.oauth_state|transcendance\.config)(?:$|/)" \
  "id:100200,phase:1,deny,status:403,log,msg:'Sensitive file probe blocked'"

SecRule REQUEST_URI "@rx (?i)(?:wp-login\.php|wp-admin|xmlrpc\.php|phpmyadmin|vendor/phpunit|cgi-bin|actuator|jmx-console)" \
  "id:100201,phase:1,deny,status:403,log,msg:'Known scanner path blocked'"

SecRule REQUEST_HEADERS:Connection "@contains upgrade" \
  "id:100202,phase:1,deny,status:403,log,msg:'Invalid WebSocket upgrade blocked',chain"
    SecRule REQUEST_HEADERS:Upgrade "!@streq websocket"

SecRule REQUEST_HEADERS:Content-Type "!@rx ^(?:application/json|application/x-www-form-urlencoded|text/plain)(?:\\s*;.*)?$" \
  "id:100203,phase:1,deny,status:415,log,msg:'Unsupported content type blocked',chain"
    SecRule REQUEST_METHOD "@streq POST"

SecRule REQUEST_URI|ARGS|REQUEST_HEADERS "@rx (?i)(?:union(?:.*?)select|select(?:.*?)from|/etc/passwd|\.\./\.\./|<script\b|%3cscript)" \
  "id:100204,phase:2,deny,status:403,log,msg:'Local attack signature blocked'"
