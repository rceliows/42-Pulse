# Local development must allow numeric loopback hosts, while production should use a real hostname.
SecRule REQUEST_HEADERS:Host "@rx ^(?:localhost|127\.0\.0\.1)(?::[0-9]+)?$" \
 "id:100900,phase:1,pass,nolog,ctl:ruleRemoveById=920350"

# OAuth callback query parameters can contain provider-generated opaque values.
SecRule REQUEST_URI "@beginsWith /auth/callback" \
 "id:100901,phase:1,pass,nolog,ctl:ruleRemoveTargetById=942100;ARGS:code,ctl:ruleRemoveTargetById=942110;ARGS:code"

# Project-specific sensitive files must never be reachable through the public edge.
SecRule REQUEST_URI "@rx (?i)(?:^|/)(?:\.env|\.git|\.oauth_state|transcendance\.config|vault-init\.json|role-id|secret-id)$" \
 "id:100910,phase:1,deny,status:403,log,msg:'Sensitive project file probe blocked by security_gateway WAF'"
