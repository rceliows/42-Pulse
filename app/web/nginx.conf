user nginx;
worker_processes 1;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';

  access_log /var/log/nginx/access.log main;
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  types_hash_max_size 2048;
  client_max_body_size 20M;

  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types text/plain text/css text/xml text/javascript
             application/x-javascript application/xml+rss
             application/json image/svg+xml;

  # Docker DNS resolver for runtime service discovery.
  resolver 127.0.0.11 valid=10s;
  resolver_timeout 5s;

  server {
    listen 8080;
    location /stub_status {
      stub_status;
      access_log off;
    }
  }

  server {
    listen 80 default_server;
    server_name _;
    set $api_upstream http://api:3000;

    # Health check
    location /health {
      access_log off;
      return 200 "OK";
      add_header Content-Type text/plain;
    }

    # WebSocket
    location /ws/ {
      proxy_pass $api_upstream;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API endpoints: proxy to Node.js
    location /api/ {
      proxy_pass $api_upstream;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static assets: long cache for hashed filenames
    location ~* \.(css|js|png|jpg|jpeg|gif|svg|ico|webp|woff|woff2|ttf|eot)$ {
      root /usr/share/nginx/html;
      expires 30d;
      add_header Cache-Control "public, immutable";
      try_files $uri =404;
    }

    # Export JSON files: served from the runtime/exports bind mount
    location ~* \.json$ {
      root /usr/share/nginx/html;
      expires 60s;
      add_header Cache-Control "public, max-age=60";
      try_files $uri =404;
    }

    # SPA fallback: serve index.html for all React Router routes
    location / {
      root /usr/share/nginx/html;
      try_files $uri $uri/ /index.html;
      expires -1;
      add_header Cache-Control "no-store";
    }

    # Deny access to dotfiles
    location ~ /\. {
      deny all;
      access_log off;
      log_not_found off;
    }
  }
}
