<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>42 Network - Live Events</title>
    <link rel="stylesheet" href="./assets/styles.css" />
    <script src="./assets/auth.js" defer></script>
    <style>
      .layout.single {
        grid-template-columns: 1fr;
      }

      .events-panel {
        min-height: calc(100vh - 220px);
        height: 79vh;
        display: flex;
        flex-direction: column;
      }

      .analytics-panel {
        min-height: calc(100vh - 220px);
        height: 79vh;
        overflow: hidden;
      }

      .events-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        flex-wrap: wrap;
      }

      .events-header .meta {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        flex-wrap: wrap;
        color: var(--text-muted);
        font-size: 0.9rem;
      }

      .switch-links {
        margin: 0;
        display: flex;
        align-items: center;
        gap: 0.35rem;
        flex-wrap: wrap;
      }

      .switch-links .page-link {
        color: var(--text);
        text-decoration: underline;
        text-underline-offset: 2px;
      }

      .switch-links .page-link.active {
        text-decoration: none;
        font-weight: 600;
        pointer-events: none;
      }

      .language-switcher {
        display: flex;
        align-items: center;
        gap: 0.45rem;
        margin-top: 0.45rem;
        color: var(--text-muted);
        font-size: 0.85rem;
      }

      .language-switcher select {
        min-width: 96px;
        padding: 0.25rem 0.55rem;
      }


      .pill {
        border: 1px solid var(--border);
        background: var(--panel-muted);
        border-radius: 999px;
        padding: 0.25rem 0.65rem;
        font-family: "JetBrains Mono", "SFMono-Regular", Consolas, monospace;
        font-size: 0.8rem;
      }

      .status-dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: var(--text-muted);
        display: inline-block;
        box-shadow: 0 0 6px rgba(0, 0, 0, 0.25);
        flex-shrink: 0;
      }

      .event-row {
        display: grid;
        grid-template-columns: 180px 157px minmax(0, 1fr);
        gap: 0.45rem;
        align-items: center;
      }

      .time-wrap {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        min-width: 0;
        justify-content: center;
        text-align: center;
      }

      .timestamp {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
      }

      #events-list {
        flex: 1;
        max-height: none;
        min-height: 0;
        overflow: auto;
        padding: 0.5rem 0.25rem 0.25rem 0.25rem;
      }

      #events-list li {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: stretch;
        gap: 0.15rem;
        transition: opacity 1000ms ease, transform 1000ms ease, border-color 120ms ease;
        min-height: 34px;
        padding: 0.35rem 0.55rem;
        font-size: 0.9rem;
        line-height: 1.2;
        background: var(--panel-muted);
        border: 1px solid transparent;
        border-radius: 6px;
      }

      #events-list li.top-event {
        border: 1px solid var(--border);
        background: var(--panel-muted);
        min-height: 40px;
        margin-bottom: 0.25rem;
      }

      #events-list li.new {
        opacity: 0;
        transform: translateY(-6px);
      }

      #events-list li.flash {
        animation: flashHighlight 5s ease;
      }

      @keyframes flashHighlight {
        0% {
          background: var(--panel-muted);
          box-shadow: 0 0 12px rgba(255, 255, 255, 0.12);
        }
        50% {
          background: var(--panel-muted);
          box-shadow: 0 0 8px rgba(255, 255, 255, 0.08);
        }
        100% {
          background: var(--panel-muted);
          box-shadow: none;
        }
      }

      #events-list li.top-event.type-connection {
        border-color: #2ecc71;
        color: #2ecc71;
      }
      #events-list li.top-event.type-deconnection {
        border-color: #cf4636;
        color: #cf4636;
      }
      #events-list li.top-event.type-evaluation {
        border-color: #1f3ad8;
        color: #1f3ad8;
      }
      #events-list li.top-event.type-correction {
        border-color: #e67e22;
        color: #e67e22;
      }
      #events-list li.top-event.type-new_seen {
        border-color: #9b59b6;
        color: #9b59b6;
      }
      #events-list li.top-event.type-wallet {
        border-color: #f1c40f;
        color: #f1c40f;
      }

      /* Ensure all text in the top event inherits the type color */
      #events-list li.top-event .timestamp,
      #events-list li.top-event .event-context,
      #events-list li.top-event .flag,
      #events-list li.top-event .event-details {
        color: inherit;
      }
      #events-list li.top-event .event-type {
        color: inherit;
      }

      .debug-box {
        margin: 0.5rem 0 0.75rem 0;
        padding: 0.75rem;
        border: 1px dashed var(--border);
        border-radius: 8px;
        background: var(--panel-muted);
        color: var(--text-muted);
        font-family: "JetBrains Mono", "SFMono-Regular", Consolas, monospace;
        font-size: 0.85rem;
        white-space: pre-wrap;
        max-height: 30vh;
        overflow: auto;
      }

      .event-type {
        font-weight: 700;
        color: var(--text);
        word-break: break-word;
        font-size: 0.9rem;
        line-height: 1.1;
        text-align: center;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
      }
      .top-event .event-type.type-connection {
        color: #2ecc71;
      }
      .top-event .event-type.type-deconnection {
        color: #cf4636;
      }
      .top-event .event-type.type-evaluation {
        color: #1f3ad8;
      }
      .top-event .event-type.type-correction {
        color: #e67e22;
      }
      .top-event .event-type.type-new_seen {
        color: #9b59b6;
      }
      .top-event .event-type.type-wallet {
        color: #f1c40f;
      }

      #events-list li:focus-visible {
        outline: none;
        border-color: #3498db;
      }

      .event-context {
        color: var(--text);
        word-break: break-word;
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem;
        font-size: 0.9rem;
        line-height: 1.1;
        align-items: center;
        min-height: 32px;
      }

      .flag {
        width: 18px;
        height: 18px;
        display: inline-block;
        vertical-align: text-bottom;
        flex-shrink: 0;
      }

      .event-details {
        color: var(--text-muted);
        overflow-wrap: anywhere;
      }

      .analytics-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.95rem;
        min-height: 0;
        overflow: hidden;
        padding-right: 0;
        align-content: start;
      }

      .analytics-card {
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--panel-muted);
        padding: 0.7rem 0.8rem;
      }

      .analytics-card.pulses {
        grid-column: 1;
      }

      .analytics-card.mix {
        grid-column: 2;
        display: flex;
        flex-direction: column;
        min-height: 0;
        overflow: hidden;
      }

      .analytics-card.summary-wide {
        margin-bottom: 0.85rem;
      }

      .analytics-card.summary-wide h3 {
        text-align: center;
      }

      .analytics-card h3 {
        margin: 0 0 0.55rem 0;
        font-size: 0.92rem;
      }

      .analytics-list {
        margin: 0;
        padding: 0;
        list-style: none;
        display: grid;
        gap: 0.62rem;
      }

      .analytics-item {
        display: block;
      }

      .analytics-label {
        min-width: 0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .analytics-value {
        font-family: "JetBrains Mono", "SFMono-Regular", Consolas, monospace;
        color: var(--text);
      }

      .analytics-muted {
        color: var(--text-muted);
      }

      .bar-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 0.5rem;
        align-items: center;
      }

      .bar-track {
        position: relative;
        margin-top: 0.35rem;
        width: 100%;
        height: 8px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        overflow: hidden;
      }

      .bar-fill {
        height: 100%;
        border-radius: 999px;
        background: linear-gradient(90deg, #2d9cdb, #27ae60);
      }

      .pie-stack {
        display: grid;
        grid-template-columns: 1fr;
        gap: 0.6rem;
        min-height: 0;
      }

      .pie {
        width: clamp(190px, 72%, 290px);
        height: auto;
        aspect-ratio: 1 / 1;
        border-radius: 50%;
        border: 1px solid var(--border);
        background: conic-gradient(#3a7afe 0deg, #3a7afe 360deg);
        margin: 0 auto;
      }

      .legend-list {
        margin: 0;
        padding: 0;
        list-style: none;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 0.18rem 0.7rem;
        overflow: visible;
      }

      .legend-item {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr) auto;
        gap: 0.35rem;
        align-items: center;
        min-width: 0;
        font-size: 0.76rem;
      }

      .legend-item .analytics-label {
        white-space: nowrap;
        overflow: visible;
        text-overflow: clip;
        line-height: 1.15;
        word-break: normal;
        overflow-wrap: normal;
      }

      .legend-item .analytics-value {
        font-size: 0.74rem;
        white-space: nowrap;
      }

      .legend-swatch {
        width: 10px;
        height: 10px;
        border-radius: 999px;
      }

      .summary-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 0.55rem;
      }

      .summary-cell {
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 0.45rem 0.55rem;
        background: rgba(255, 255, 255, 0.02);
        text-align: center;
      }

      .summary-label {
        color: var(--text-muted);
        font-size: 0.78rem;
        margin-bottom: 0.2rem;
      }

      .summary-value {
        font-family: "JetBrains Mono", "SFMono-Regular", Consolas, monospace;
        color: var(--text);
      }

      @media (max-width: 1280px) {
        .layout.two {
          grid-template-columns: 1fr;
        }

        .events-panel,
        .analytics-panel {
          min-height: 0;
          height: auto;
        }

        .analytics-panel {
          overflow: visible;
        }

        .analytics-grid {
          grid-template-columns: 1fr;
        }

        .analytics-card.pulses,
        .analytics-card.mix {
          grid-column: auto;
          grid-row: auto;
        }
      }

      @media (max-width: 900px) {
        .layout.two {
          grid-template-columns: 1fr;
        }
        .analytics-grid {
          grid-template-columns: 1fr;
        }
        .legend-list {
          grid-template-columns: 1fr;
        }
        .analytics-card.pulses,
        .analytics-card.mix {
          grid-column: auto;
          grid-row: auto;
        }
        .summary-grid {
          grid-template-columns: 1fr 1fr;
        }
        .pie {
          width: clamp(180px, 62vw, 260px);
        }
        .event-row {
          grid-template-columns: 1fr;
        }
        #events-list {
          max-height: none;
        }
      }
    </style>

  <body>
    <header style="padding: 0.6rem 1.2rem;">
      <div class="branding" style="gap: 0.75rem;">
        <img
          src="./assets/42_pulse_logo.svg"
          alt="42 Network Pulse logo"
          style="width: 68px; height: 68px;"
        />
        <div>
          <h1 style="margin: 0 0 0.2rem 0;">42 Network Pulse</h1>
          <p class="switch-links">
            <a href="/message.html" class="page-link active" aria-current="page" data-i18n="nav.live">Live detector</a>
            <span style="margin: 0 0.35rem;">|</span>
            <a href="/admin.html" class="page-link" data-i18n="nav.admin">Admin</a>
            <span style="margin: 0 0.35rem;">|</span>
            <a href="/events.html" class="page-link" data-i18n="nav.events">Events DB</a>
            <span style="margin: 0 0.35rem;">|</span>
            <a href="/events_dashboard.html" class="page-link" data-i18n="nav.dashboard">DB Dashboard</a>
            <span style="margin: 0 0.35rem;">|</span>
            <a href="/terms.html" class="page-link" data-i18n="nav.terms">Terms</a>
            <span style="margin: 0 0.35rem;">|</span>
            <a href="/privacy.html" class="page-link" data-i18n="nav.privacy">Privacy</a>
          </p>
          <label class="language-switcher">
            <span data-i18n="language.label">Language</span>
            <select id="language-select" aria-label="Language" data-i18n-aria-label="language.label">
              <option value="en">English</option>
              <option value="fr">Français</option>
              <option value="es">Español</option>
            </select>
          </label>
        </div>
      </div>
      <div class="session-actions">
        <p class="status-text" id="status-text" data-i18n="status.connecting">Connecting...</p>
        <button type="button" class="ghost logout-button" data-logout-button>Log out</button>
      </div>
    </header>

    <main>
      <section class="layout two">
        <div class="panel events-panel" style="display: flex; flex-direction: column;">
          <div class="panel-header events-header">
            <h2 id="title">Last 10 events (UTC)</h2>
            <div class="meta">
              <span class="status-dot" id="status-dot" title="status"></span>
              <span class="pill" id="poll-pill">ws=live</span>
              <span class="pill" id="endpoint-pill">/ws/events (detector)</span>
              <span class="pill" id="last-pill">last=—</span>
            </div>
          </div>
          <ul id="events-list" aria-live="polite"></ul>
          <div class="debug-box" id="pending-debug" aria-live="polite" style="height: 120px; flex-shrink: 0;"></div>
        </div>
        <div class="panel events-panel analytics-panel">
          <div class="panel-header events-header">
            <h2 data-i18n="analytics.title">Detector Analytics - rolling 1h</h2>
            <div class="meta">
              <span class="pill" id="analytics-window-pill">window=1h</span>
              <span class="pill" id="analytics-last-pill">updated=—</span>
            </div>
          </div>
          <section class="analytics-card summary-wide">
            <div class="summary-grid" id="analytics-summary-grid"></div>
          </section>
          <div class="analytics-grid">
            <section class="analytics-card pulses">
              <h3 data-i18n="analytics.by_campus">Events by campus - top 7</h3>
              <ol class="analytics-list" id="analytics-pulses-top-bars"></ol>
            </section>
            <section class="analytics-card mix">
              <h3 data-i18n="analytics.mix">Event mix - all types</h3>
              <div class="pie-stack">
                <div class="pie" id="analytics-mix-pie" aria-label="event mix pie chart" data-i18n-aria-label="analytics.mix_chart"></div>
                <ul class="legend-list" id="analytics-mix-legend"></ul>
              </div>
            </section>
          </div>
        </div>
      </section>
    </main>

    <template id="event-item">
      <li class="info">
        <div class="event-row">
          <div class="time-wrap">
            <span class="timestamp"></span>
          </div>
          <span class="event-type"></span>
          <span class="event-context"></span>
        </div>
        <div class="event-details"></div>
      </li>
    </template>

        const a = 0x1f1e6 + (upper.charCodeAt(0) - 65);

        return `${a.toString(16)}-${b.toString(16)}`;

        if (event && typeof event._event_id === "string" && event._event_id.trim() !== "") {
          return `ws:${event._event_id.trim()}`;

        const types = Array.isArray(event?.types) ? event.types.join("+") : "";
        const ts = Number(event?.ts) || 0;
        const uid = event?.user_id ?? "";
        const updatedAt = event?.updated_at ?? "";
        const changes = Array.isArray(event?.changes) ? JSON.stringify(event.changes) : "";
        return `${uid}|${updatedAt}|${types}|${ts}|${changes}`;

      function parseEventTimeMs(event) {
        const updatedMs = (event && typeof event.updated_at === "string")
          ? Date.parse(event.updated_at)
          : NaN;
        const tsMs = (event && typeof event.ts === "number" && Number.isFinite(event.ts))
          ? (event.ts * 1000)
          : NaN;

        if (Number.isFinite(updatedMs) && Number.isFinite(tsMs)) {
          // Fresh detector snapshots may carry an old updated_at; in that case,
          // keep ordering by detector time so events are not dropped at intake.
          if (updatedMs < tsMs - 5 * 60_000) return tsMs;
          return updatedMs;
        }
        if (Number.isFinite(updatedMs)) return updatedMs;
        if (Number.isFinite(tsMs)) return tsMs;
        return NaN;
      }

      function analyticsEventTimeMs(event) {
        const t = event && typeof event.ts === "number" && Number.isFinite(event.ts) ? event.ts * 1000 : NaN;
        if (Number.isFinite(t)) return t;
        return parseEventTimeMs(event);
      }

        if (!event || event.campus_id === null || event.campus_id === undefined || event.campus_id === "") {

      function ingestAnalyticsEvents(events, nowMs) {
        // /api/events/latest already returns a rolling window snapshot.
        // Rebuild client analytics state from this snapshot each poll so
        // summary numbers stay strictly aligned with the server window.
        analyticsEvents = [];
        analyticsSeen.clear();

        if (!Array.isArray(events) || events.length === 0) return;

        const cutoff = nowMs - ANALYTICS_WINDOW_MS;

        for (const event of events) {
          const key = eventKey(event);
          if (!key || analyticsSeen.has(key)) continue;

          const eventMs = analyticsEventTimeMs(event);
          if (!Number.isFinite(eventMs)) continue;
          if (eventMs < cutoff) continue;
          if (eventMs > nowMs + FUTURE_GRACE_MS) continue;

          analyticsSeen.add(key);
          analyticsEvents.push({
            key,
            ms: eventMs,
            campus: analyticsCampusKey(event),
            user: analyticsUserKey(event),
            types: Array.isArray(event.types) && event.types.length > 0 ? event.types : ["unknown"],
          });
        }
      }

      function pruneAnalytics(nowMs) {
        const cutoff = nowMs - ANALYTICS_WINDOW_MS;
        analyticsEvents = analyticsEvents.filter((item) => item.ms >= cutoff && item.ms <= nowMs + FUTURE_GRACE_MS);
        analyticsSeen.clear();
        for (const item of analyticsEvents) {
          analyticsSeen.add(item.key);
        }

        const key = String(type || "").toLowerCase().trim();

      function renderTopBars(elementId, rows, options = {}) {
        const el = document.getElementById(elementId);

        const maxValue = Math.max(...rows.map(([, count]) => Number(count) || 0), 1);
        el.innerHTML = rows
          .map(([key, value], idx) => {
            const count = Number(value) || 0;
            const ratio = Math.max(0, Math.min(100, (count / maxValue) * 100));
            const label = escapeHtml(campusLabelFromKey(key));
            const fillClass = options.fillClass ? ` ${options.fillClass}` : "";
            return `<li class="analytics-item">
                <div class="bar-row">

                  <span class="analytics-value">${count}</span>
                </div>

      function renderMixPie(mixRows) {
        const pie = document.getElementById("analytics-mix-pie");
        const legend = document.getElementById("analytics-mix-legend");
        if (!pie || !legend) return;

        const displayRows = Array.isArray(mixRows) ? mixRows : [];

        if (!displayRows || displayRows.length === 0) {
          pie.style.background = "conic-gradient(#3a7afe 0deg, #3a7afe 360deg)";
          legend.innerHTML = `<li class="analytics-muted">${escapeHtml(t("analytics.no_types"))}</li>`;
          return;
        }

        const total = displayRows.reduce((acc, [, count]) => acc + (Number(count) || 0), 0);
        if (total <= 0) {
          pie.style.background = "conic-gradient(#3a7afe 0deg, #3a7afe 360deg)";
          legend.innerHTML = `<li class="analytics-muted">${escapeHtml(t("analytics.no_types"))}</li>`;
          return;
        }

        let accDeg = 0;
        const segments = [];
        const legends = [];

        displayRows.forEach(([type, count], idx) => {
          const c = Number(count) || 0;
          const color = mixColorForType(type, idx);
          const span = (c / total) * 360;
          const start = accDeg;
          const end = accDeg + span;
          segments.push(`${color} ${start.toFixed(2)}deg ${end.toFixed(2)}deg`);
          accDeg = end;

          const pct = ((c / total) * 100).toFixed(1);
          legends.push(
              `<li class="legend-item">
              <span class="legend-swatch" style="background:${color}"></span>
              <span class="analytics-label">${escapeHtml(translateType(type))}</span>

      function renderAnalytics(nowMs) {
        pruneAnalytics(nowMs);

        const pulsesByCampus = new Map();
        const mixByType = new Map();

        for (const item of analyticsEvents) {
          if (item.campus !== "unknown") {
            pulsesByCampus.set(item.campus, (pulsesByCampus.get(item.campus) || 0) + 1);
          }

          for (const rawType of item.types) {
            const type = typeof rawType === "string" && rawType.trim() ? rawType.trim() : "unknown";
            mixByType.set(type, (mixByType.get(type) || 0) + 1);
          }
        }

        const totalEvents = analyticsEvents.length;
        const totalUsers = new Set(analyticsEvents.map((item) => item.user).filter(Boolean)).size;
        const totalCampuses = pulsesByCampus.size;

        renderTopBars("analytics-pulses-top-bars", pulsesRows, {

        const mixRows = Array.from(mixByType.entries()).sort((a, b) => {
          if (b[1] !== a[1]) return b[1] - a[1];

        renderMixPie(mixRows);

        const topType = mixRows.length > 0 ? translateType(mixRows[0][0]) : "-";

          totalEvents,

        const typeRaw = primaryType(event);
        const typeText = translateType(typeRaw || "unknown");
        const { label: campusLabel, flagSvg: campusFlagSvg, country: campusCountry } = campusParts(event.campus_id);
        const details = ""; // hide details globally

        node.querySelector(".timestamp").textContent = timeText;
        const typeEl = node.querySelector(".event-type");
        typeEl.textContent = typeText;
        typeEl.dataset.eventType = typeRaw || "unknown";
        typeEl.className = "event-type";
        if (typeRaw) typeEl.classList.add(typeClassName(typeRaw));
        const contextEl = node.querySelector(".event-context");
        contextEl.textContent = "";
        const contextSpan = document.createElement("span");
        contextSpan.textContent = campusLabel;
        contextSpan.dataset.campusId = event.campus_id ?? "";
        contextEl.appendChild(contextSpan);
        if (campusFlagSvg) {
          const flagImg = document.createElement("img");
          flagImg.className = "flag";
          flagImg.src = `/assets/twemoji/svg/${campusFlagSvg}.svg?v=${FLAG_VERSION}`;
          flagImg.alt = campusCountry ? t("events.country_flag", { country: translateCountry(campusCountry) }) : t("events.flag");
          flagImg.dataset.country = campusCountry || "";
          flagImg.loading = "lazy";
          flagImg.decoding = "async";
          contextEl.appendChild(flagImg);
        }

        const detailsEl = node.querySelector(".event-details");
        detailsEl.textContent = "";
        detailsEl.style.display = "none";
        li.dataset.key = eventKey(event);
        if (typeRaw) li.classList.add(typeClassName(typeRaw));
        if (Number.isFinite(displayMs)) {
          li.dataset.ms = String(displayMs);
        }
        return { node, li };
      }

      function trimDisplayed() {
        const keep = getKeep();
        const items = Array.from(els.list.querySelectorAll("li"));
        if (items.length <= keep) return;
        items.slice(keep).forEach((li) => li.remove());
      }

      function pruneOldDisplayed(nowMs) {
        const cutoff = nowMs - INITIAL_WINDOW_MS;
        for (const li of Array.from(els.list.querySelectorAll("li"))) {
          const ms = Number(li.dataset.ms || "0");
          if (ms && ms < cutoff) {
            const key = li.dataset.key;
            if (key) known.delete(key);
            li.remove();
          }
        }
        updateTopHighlight();
      }

      function rememberKey(key) {
        if (!key) return;
        if (known.has(key)) return;
        known.add(key);
        knownOrder.push(key);
        if (knownOrder.length > KNOWN_MAX) {
          const old = knownOrder.shift();
          if (old) known.delete(old);
        }
      }

      function insertOrdered(event, animate = true) {
        const ms = parseEventTimeMs(event);
        const { node, li } = buildNode(event);
        li.dataset.ms = String(ms);
        if (animate) {
          li.classList.add("new");
          li.classList.add("flash");
        }

        const items = Array.from(els.list.querySelectorAll("li"));
        let inserted = false;
        for (const item of items) {
          const itemMs = Number(item.dataset.ms || "0");
          if (ms > itemMs) {
            item.before(node);
            inserted = true;
            break;
          }
        }
        if (!inserted) {
          els.list.appendChild(node);
        }

        if (animate) {
          requestAnimationFrame(() => {
            li.classList.remove("new");
            setTimeout(() => li.classList.remove("flash"), 1000);
          });
        }

        trimDisplayed();
        updateTopHighlight();
      }

      function releaseReady() {
        const nowMs = Date.now();
        // always keep pending ordered by event time
        pending.sort((a, b) => {
          const ta = parseEventTimeMs(a);
          const tb = parseEventTimeMs(b);
          return (ta || 0) - (tb || 0);
        });
        let released = 0;
        while (pending.length > 0 && released < RELEASE_MAX_PER_TICK) {
          const ev = pending[0];
          const t = parseEventTimeMs(ev);
          if (!Number.isFinite(t) || t > nowMs + FUTURE_GRACE_MS) {
            pending.shift();
            continue;
          }
          if (t > nowMs - DISPLAY_DELAY_MS) break; // not ready yet
          pending.shift();
          const key = eventKey(ev);
          if (key) pendingKeys.delete(key);
          if (known.has(key)) continue;
          rememberKey(key);
          const animate = released < ANIM_MAX_PER_TICK;
          insertOrdered(ev, animate);
          released += 1;
          // no break: flush all ready items
        }
        return released;
      }

      function updateTopHighlight() {
        const items = Array.from(els.list.querySelectorAll("li"));
        for (const li of items) {
          li.classList.remove("top-event");
        }
        if (items.length > 0) {
          items[0].classList.add("top-event");
        }
      }

      function updatePendingDebug(nowMs) {
        if (!els.pendingBox) return;
        if (pending.length === 0) {
          els.pendingBox.textContent = `${t("events.pending")}: 0`;
          return;
        }
        const lines = [];
        lines.push(`${t("events.pending")}: ${pending.length}`);
        // ensure preview is ordered by updated_at asc (oldest first)
        const ordered = [...pending].sort((a, b) => {
          const ta = parseEventTimeMs(a);
          const tb = parseEventTimeMs(b);
          return (ta || 0) - (tb || 0);
        });
        const preview = ordered.slice(0, PENDING_PREVIEW);
        for (const ev of preview) {
          const t = parseEventTimeMs(ev);
          const releaseAt = Number.isFinite(t) ? t + DISPLAY_DELAY_MS : null;
          const ready = Number.isFinite(releaseAt) ? Math.max(0, Math.round((releaseAt - nowMs) / 1000)) : "?";
          const stamp = ev.updated_at || (Number.isFinite(t) ? new Date(t).toISOString() : "?");
          lines.push(`- ${translateType(primaryType(ev) || "unknown")} ${stamp} ${t("events.ready_in")}=${ready}s`);
        }
        els.pendingBox.textContent = lines.join("\n");
      }

      function normalizeEnvelopeEvent(item) {
        if (!item || typeof item !== "object") return null;
        if (item.event && typeof item.event === "object") {
          const ev = { ...item.event };
          if (typeof item.id === "string" && item.id.trim() !== "") {
            ev._event_id = item.id.trim();
          }
          if (typeof item.event_ms === "number" && Number.isFinite(item.event_ms)) {
            ev._event_ms = item.event_ms;
          }
          return ev;
        }
        return { ...item };
      }

      function rebuildWindowEvents(serverNowMs) {
        const cutoff = serverNowMs - ANALYTICS_WINDOW_MS;
        for (const [key, ev] of wsWindowMap.entries()) {
          const t = parseEventTimeMs(ev);
          if (!Number.isFinite(t) || t < cutoff || t > serverNowMs + FUTURE_GRACE_MS) {
            wsWindowMap.delete(key);
          }
        }
        return Array.from(wsWindowMap.values()).sort((a, b) => {
          const ta = parseEventTimeMs(a);
          const tb = parseEventTimeMs(b);
          return (ta || 0) - (tb || 0);
        });
      }

      function seedDisplayedFromSnapshot(sortedAsc, serverNowMs) {
        const readyCutoff = serverNowMs - DISPLAY_DELAY_MS;
        const windowCutoff = serverNowMs - INITIAL_WINDOW_MS;
        const readyEvents = sortedAsc.filter((ev) => {
          const t = parseEventTimeMs(ev);
          if (!Number.isFinite(t)) return false;
          if (t < windowCutoff) return false;
          if (t > readyCutoff) return false;
          if (t > serverNowMs + FUTURE_GRACE_MS) return false;
          return true;
        });
        const seed = readyEvents.slice(-getKeep());

        setListHtml(els.list, "");
        known.clear();
        knownOrder.length = 0;

        for (const ev of seed) {
          const key = eventKey(ev);
          if (!key) continue;
          rememberKey(key);
          insertOrdered(ev, false);
        }
        updateTopHighlight();
      }

      function applyIncomingWsEvents(incoming, serverNowMs, { replaceWindow = false } = {}) {
        if (replaceWindow) {
          wsWindowMap.clear();
          pending = [];
          pendingKeys.clear();
        }

        const batch = Array.isArray(incoming) ? incoming : [];
        for (const raw of batch) {
          const ev = normalizeEnvelopeEvent(raw);
          if (!ev) continue;
          const key = eventKey(ev);
          if (!key) continue;
          wsWindowMap.set(key, ev);
          if (typeof ev._event_id === "string" && ev._event_id) {
            wsLastEventId = ev._event_id;
          }
        }

        const sortedAsc = rebuildWindowEvents(serverNowMs);
        ingestAnalyticsEvents(sortedAsc, serverNowMs);
        renderAnalytics(serverNowMs);

        if (!initialized) {
          initialized = true;
          // On page refresh, seed only the latest visible rows, then continue live.
          // Keep only the last DISPLAY_DELAY window in pending to avoid replay storms.
          seedDisplayedFromSnapshot(sortedAsc, serverNowMs);
          baselineMs = serverNowMs - DISPLAY_DELAY_MS - START_GRACE_MS;
          sinceSeconds = toEpochSeconds(baselineMs);
        }

        let added = 0;
        for (const ev of sortedAsc) {
          const key = eventKey(ev);
          const t = parseEventTimeMs(ev);
          if (!key || pendingKeys.has(key) || known.has(key)) continue;
          if (!Number.isFinite(t) || t < baselineMs) continue;
          if (t > serverNowMs + FUTURE_GRACE_MS) continue;
          pending.push(ev);
          pendingKeys.add(key);
          added += 1;
        }

        pending.sort((a, b) => {
          const ta = parseEventTimeMs(a);
          const tb = parseEventTimeMs(b);
          return (ta || 0) - (tb || 0);
        });

        releaseReady();
        pruneOldDisplayed(serverNowMs);
        updatePendingDebug(serverNowMs);

        if (pending.length > 0) {
          const maxSeenMs = Math.max(
            baselineMs,
            ...pending.map((e) => parseEventTimeMs(e)).filter(Number.isFinite)
          );
          baselineMs = maxSeenMs;
          sinceSeconds = toEpochSeconds(baselineMs);
        }

        lastServerNowMs = serverNowMs;
        els.lastPill.textContent = t("pill.last", { time: formatTimeUtc(serverNowMs) });
        lastPollMs = Date.now();
        setStatusIndicator(
          true,
          `WS · batch=${batch.length} new=${added} pending=${pending.length} showing=${els.list.children.length}`
        );
      }

      function wsEndpointUrl() {
        const protocol = window.location.protocol === "https:" ? "wss:" : "ws:";
        const url = new URL(`${protocol}//${window.location.host}/ws/events`);
        if (wsLastEventId) {
          url.searchParams.set("since_id", wsLastEventId);
        }
        return url.toString();
      }

      function clearWsReconnectTimer() {
        if (!wsReconnectTimer) return;
        clearTimeout(wsReconnectTimer);
        wsReconnectTimer = null;
      }

      function scheduleWsReconnect(reason) {
        if (wsReconnectTimer) return;
        const waitMs = wsRetryMs;
        setStatusIndicator(false, `WS reconnect in ${Math.round(waitMs / 1000)}s (${reason})`);
        wsReconnectTimer = setTimeout(() => {
          wsReconnectTimer = null;
          connectWs();
        }, waitMs);
        wsRetryMs = Math.min(WS_MAX_RETRY_MS, Math.round(wsRetryMs * 1.7));
      }

      function handleWsPayload(payload) {
        const type = String(payload?.type || "");
        if (!type) return;

        const parsedMs = Date.parse(payload.timestamp_utc || "");
        const serverNowMs = Number.isFinite(parsedMs) ? parsedMs : Date.now();

        if (type === "ws_ready") {
          wsConnected = true;
          lastPollMs = Date.now();
          return;
        }

        if (type === "events_snapshot") {
          const mode = String(payload.mode || "full");
          const replaceWindow = mode === "full";
          applyIncomingWsEvents(payload.events, serverNowMs, { replaceWindow });
          return;
        }

        if (type === "events_delta") {
          applyIncomingWsEvents(payload.events, serverNowMs, { replaceWindow: false });
          return;
        }

        if (type === "events_heartbeat") {
          lastPollMs = Date.now();
          const clients = Number(payload.connected_clients);
          wsConnectedClients = Number.isFinite(clients) ? clients : wsConnectedClients;
          lastServerNowMs = serverNowMs;
          els.lastPill.textContent = t("pill.last", { time: formatTimeUtc(serverNowMs) });
          setStatusIndicator(true, `WS heartbeat · clients=${payload.connected_clients ?? "?"}`);
          return;
        }

        if (type === "events_snapshot_error") {
          setStatusIndicator(false, `WS snapshot error: ${payload.error || "unknown"}`);
        }
      }

      function connectWs() {
        if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) {
          return;
        }
        const endpoint = wsEndpointUrl();
        ws = new WebSocket(endpoint);

        ws.onopen = () => {
          clearWsReconnectTimer();
          wsConnected = true;
          wsRetryMs = WS_BASE_RETRY_MS;
          lastPollMs = Date.now();
          setStatusIndicator(true, "WS connected");
        };

        ws.onmessage = (event) => {
          let payload = null;
          try {
            payload = JSON.parse(event.data);
          } catch {
            return;
          }
          handleWsPayload(payload);
        };

        ws.onerror = () => {
          // rely on onclose for reconnect
        };

        ws.onclose = (event) => {
          wsConnected = false;
          ws = null;
          scheduleWsReconnect(`close ${event.code}`);
        };
      }

      function monitorWsFreshness() {
        if (!wsConnected) return;
        const ageMs = Date.now() - lastPollMs;
        if (ageMs > WS_STALE_AFTER_MS) {
          setStatusIndicator(false, `WS stale (${Math.round(ageMs / 1000)}s since update)`);
        }
      }

      if (els.languageSelect) {
        els.languageSelect.value = getLanguage();
        els.languageSelect.addEventListener("change", () => {
          localStorage.setItem(LANGUAGE_KEY, els.languageSelect.value);
          applyLanguage();
        });
      }
      applyLanguage();

      connectWs();
      releaseTimer = setInterval(() => {
        releaseReady();
        const nowMs = Date.now();
        updatePendingDebug(nowMs);
        renderAnalytics(nowMs);
        monitorWsFreshness();
      }, RELEASE_MS);

      function setStatusIndicator(ok, _message) {
        if (!els.status) return;
        const now = Date.now();
        const isFresh = now - lastPollMs < WS_STALE_AFTER_MS;
        const isLight = ok && isFresh && pending.length < 100;
        const clientsLabel = wsConnectedClients === null ? "clients=?" : `clients=${wsConnectedClients}`;
        if (isLight) {
          els.status.textContent = "";
          els.status.title = "";
          if (els.statusDot) {
            els.statusDot.style.background = "#2ecc71";
            els.statusDot.title = clientsLabel;
          }
        } else {
          els.status.textContent = "";
          els.status.title = "";
          if (els.statusDot) {
            els.statusDot.style.background = ok ? "var(--text-muted)" : "#e74c3c";
            els.statusDot.title = clientsLabel;
          }
        }
      }

      // Real-time detector feed is driven by WebSocket /ws/events.
    </script>
  </body>
</html>
